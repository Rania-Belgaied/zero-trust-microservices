# ─────────────────────────────────────────────────────────────────────────────
# deployments.yaml — VERSION DYNAMIQUE
# Chaque service a 2 instances : ctx-a (principal) et ctx-b (secours)
# Le CCA bascule entre elles via patch du selector du Service
# ─────────────────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════
# SERVICE-AUTH
# ═══════════════════════════════════════════════════════
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-auth-sa
  namespace: app
---
# Instance CTX-A (principal)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-auth-ctx-a
  namespace: app
  labels:
    app: service-auth
    context: ctx-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-auth
      context: ctx-a
  template:
    metadata:
      labels:
        app: service-auth
        context: ctx-a
    spec:
      serviceAccountName: service-auth-sa
      containers:
      - name: service-auth
        image: service-auth:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Instance CTX-B (secours)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-auth-ctx-b
  namespace: app
  labels:
    app: service-auth
    context: ctx-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-auth
      context: ctx-b
  template:
    metadata:
      labels:
        app: service-auth
        context: ctx-b
    spec:
      serviceAccountName: service-auth-sa
      containers:
      - name: service-auth
        image: service-auth:1.0       # même image
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service avec selector dynamique — ctx-a actif par défaut
apiVersion: v1
kind: Service
metadata:
  name: service-auth
  namespace: app
spec:
  selector:
    app: service-auth
    context: ctx-a          # ← le CCA modifie cette valeur
  ports:
  - name: http
    port: 8080
    targetPort: 8080

