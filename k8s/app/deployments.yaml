---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-auth-sa
  namespace: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-auth
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-auth
  template:
    metadata:
      labels:
        app: service-auth
    spec:
      serviceAccountName: service-auth-sa
      containers:
      - name: service-auth
        image: service-auth:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: service-auth
  namespace: app
spec:
  selector:
    app: service-auth
  ports:
  - name: http
    port: 8080
    targetPort: 8080
