# Règle 0 : tout est interdit par défaut dans le namespace app
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: app
spec: {}

# Règle 1 : service-orders peut appeler service-auth
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-orders-to-auth
  namespace: app
spec:
  selector:
    matchLabels:
      app: service-auth
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/app/sa/service-orders-sa"
    to:
    - operation:
        methods: ["POST"]
        paths: ["/api/login", "/api/verify"]
        ports: ["8080"]
    - operation:
        methods: ["GET"]
        paths: ["/api/verify", "/api/status"]
        ports: ["8080"]

# Règle 2 : service-orders peut appeler service-payment
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-orders-to-payment
  namespace: app
spec:
  selector:
    matchLabels:
      app: service-payment
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/app/sa/service-orders-sa"
    to:
    - operation:
        methods: ["POST"]
        paths: ["/api/payments", "/api/payments/process"]
        ports: ["8080"]
    - operation:
        methods: ["GET"]
        paths: ["/api/payments/status", "/api/payments/*/status"]
        ports: ["8080"]

