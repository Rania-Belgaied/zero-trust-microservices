# Règle 5 : service-payment → service-auth
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-payment-to-auth
  namespace: app
spec:
  selector:
    matchLabels:
      app: service-auth
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/app/sa/service-payment-sa"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/verify", "/api/status"]
        ports: ["8080"]

# Règle 6 : LSA agents → health check
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-lsa-health-check
  namespace: app
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/agents/sa/lsa-sa"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/health", "/metrics"]
        ports: ["8080"]