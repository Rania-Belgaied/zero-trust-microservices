---
# LSA pour service-auth
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsa-service-auth
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsa-service-auth
  template:
    metadata:
      labels:
        app: lsa-service-auth
    spec:
      containers:
      - name: lsa
        image: lsa-agent:2.0
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        env:
        - name: TARGET_SERVICE
          value: "service-auth"
        - name: CCA_URL
          value: "http://cca.agents.svc.cluster.local:8080"
        - name: OPA_URL
          value: "http://opa.security.svc.cluster.local:8181"
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
        - name: KEYCLOAK_URL
          value: "http://keycloak.security.svc.cluster.local:8080"
        - name: COLLECT_INTERVAL
          value: "30"
        - name: KEYCLOAK_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-lsa-secret
              key: client_secret
        - name: DATASET_PATH
          value: "/data/security_dataset.csv"
        - name: ATTACK_TYPE
          value: "none"
        volumeMounts:
        - name: dataset
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: dataset
        persistentVolumeClaim:
          claimName: dataset-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lsa-service-auth
  namespace: agents
spec:
  selector:
    app: lsa-service-auth
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090

