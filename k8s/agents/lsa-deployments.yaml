# ─────────────────────────────────────────────────────────────────────────────
# lsa-deployments.yaml — VERSION DYNAMIQUE
# Chaque service a 2 LSA : un par contexte (ctx-a et ctx-b)
# Le LSA envoie le champ "service" au format "service-name:context"
# ─────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════
# LSA pour service-auth
# ══════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsa-service-auth-ctx-a
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsa-service-auth-ctx-a
  template:
    metadata:
      labels:
        app: lsa-service-auth-ctx-a
    spec:
      containers:
      - name: lsa
        image: lsa-agent:2.0
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        env:
        - name: TARGET_SERVICE
          value: "service-auth:ctx-a"    # ← format "service:context"
        - name: CCA_URL
          value: "http://cca.agents.svc.cluster.local:8080"
        - name: OPA_URL
          value: "http://opa.security.svc.cluster.local:8181"
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
        - name: KEYCLOAK_URL
          value: "http://keycloak.security.svc.cluster.local:8080"
        - name: COLLECT_INTERVAL
          value: "30"
        - name: KEYCLOAK_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-lsa-secret
              key: client_secret
        - name: DATASET_PATH
          value: "/data/security_dataset.csv"
        - name: ATTACK_TYPE
          value: "none"
        volumeMounts:
        - name: dataset
          mountPath: /data
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "128Mi", cpu: "200m" }
      volumes:
      - name: dataset
        persistentVolumeClaim:
          claimName: dataset-pvc
---
