---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cca
  namespace: agents
  labels:
    app: cca
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cca
  template:
    metadata:
      labels:
        app: cca
    spec:
      serviceAccountName: lsa-agent-sa
      containers:
      - name: cca
        image: cca-agent:4.0
        imagePullPolicy: Never
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cca
  namespace: agents
spec:
  selector:
    app: cca
  ports:
  - name: http
    port: 8080
    targetPort: 8080