grafana:
  adminPassword: grafana-zero-trust-2026
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  sidecar:
    dashboards:
      enabled: true
    resources:
      requests:
        memory: 50Mi
        cpu: 20m
      limits:
        memory: 100Mi
        cpu: 100m

prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

prometheusOperator:
