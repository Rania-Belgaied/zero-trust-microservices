    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 200m
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 128Mi
      cpu: 100m

alertmanager:
  enabled: false

nodeExporter:
  enabled: false
